services:
  postgres:
    image: postgres:16-alpine
    container_name: zephyra-library-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: library_mgmt
      POSTGRES_USER: library_user
      POSTGRES_PASSWORD: library_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U library_user -d library_mgmt"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
